<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - Pucho Public School</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="assets/logo.png" alt="Logo" style="height: 32px;">
                <h2>Parent Portal</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" class="menu-link active">Dashboard</a></li>
                <li><a href="#" class="menu-link">Attendance</a></li>
                <li><a href="#" class="menu-link">Fees</a></li>
                <li><a href="#" class="menu-link">Exam Results</a></li>
                <li><a href="#" class="menu-link">Notices</a></li>
                <li><a href="#" class="menu-link">School Calendar</a></li>
                <li><a href="#" id="parentLogout" class="menu-link">Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <header class="admin-header">
                <div class="admin-header-left">
                    <h1>Welcome To Parent Portal</h1>
                </div>
                <div class="admin-header-right">
                    <div class="admin-profile">
                        <div class="admin-profile-icon">P</div>
                        <div class="admin-profile-info">
                            <div class="admin-profile-name">Parent Name</div>
                            <div class="admin-profile-role">Parent of Rahul (10-A)</div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="dashboard-content" id="mainContent">
                <!-- Content will be dynamically loaded here -->
            </main>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="auth.js"></script>
    <script src="parent-dashboard.js"></script>
</body>

</html>
