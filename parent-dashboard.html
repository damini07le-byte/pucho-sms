<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - Pucho Public School</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>Parent Portal</h2>
            <ul class="sidebar-menu">
                <li><a href="#" class="active">Dashboard</a></li>
                <li><a href="#">Attendance</a></li>
                <li><a href="#">Fee Status</a></li>
                <li><a href="#">Exam Results</a></li>
                <li><a href="#">Timetable</a></li>
                <li><a href="#">Notifications</a></li>
                <li><a href="#" id="parentLogout">Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <div style="flex: 1; display: flex; flex-direction: column;">
            <header class="admin-header">
                <div class="admin-header-left" style="display: flex; align-items: center; gap: 1rem;">
                    <img src="assets/logo.png" alt="Logo" style="height: 40px;">
                    <h1>Pucho Public School - Parent Portal</h1>
                </div>
                <div class="admin-header-right">
                    <div class="admin-profile">
                        <div class="admin-profile-icon">P</div>
                        <div class="admin-profile-info">
                            <div class="admin-profile-name">Parent User</div>
                            <div class="admin-profile-role">Guardian</div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="dashboard-content" id="mainContent">
                <!-- Content will be dynamically loaded here -->
            </main>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="auth.js"></script>
    <script src="parent-dashboard.js"></script>
</body>

</html>
