<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - Pucho Public School</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="assets/logo.png" alt="Logo" style="height: 32px;">
                <h2>Staff Portal</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" class="menu-link active">Dashboard</a></li>
                <li><a href="#" class="menu-link">Admissions</a></li>
                <li><a href="#" class="menu-link">Fees Management</a></li>
                <li><a href="#" class="menu-link">Attendance</a></li>
                <li><a href="#" class="menu-link">Exams</a></li>
                <li><a href="#" class="menu-link">Students</a></li>
                <li><a href="#" class="menu-link">Reports</a></li>
                <li><a href="#" id="staffLogout" class="menu-link">Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <header class="admin-header">
                <div class="admin-header-left">
                    <h1>Welcome To Staff Portal</h1>
                </div>
                <div class="admin-header-right">
                    <div class="admin-profile">
                        <div class="admin-profile-icon">S</div>
                        <div class="admin-profile-info">
                            <div class="admin-profile-name">Staff Member</div>
                            <div class="admin-profile-role">Teacher</div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="dashboard-content" id="mainContent">
                <!-- Content will be dynamically loaded here -->
            </main>
        </div>
    </div>

    <!-- Modals -->
    <!-- Mark Attendance Modal -->
    <div id="markAttendanceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Mark Daily Attendance</h3>
                <button class="modal-close" onclick="closeModal('markAttendanceModal')">&times;</button>
            </div>
            <form id="markAttendanceForm">
                <div class="form-group">
                    <select id="attClass" required>
                        <option value="">Select Class</option>
                        <option value="10-A">Class 10-A</option>
                        <option value="10-B">Class 10-B</option>
                        <option value="9-A">Class 9-A</option>
                    </select>
                    <label for="attClass">Class</label>
                </div>
                <div class="form-group">
                    <input type="date" id="attDate" required placeholder=" ">
                    <label for="attDate">Date</label>
                </div>
                <div class="form-group" style="padding-top: 1rem;">
                    <label
                        style="position: static; font-size: 0.875rem; color: var(--text-muted); font-weight: 600; margin-bottom: 0.5rem; display: block;">Status
                        for All Students</label>
                    <div style="display: flex; gap: 1rem;">
                        <label
                            style="position: static; font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem;"><input
                                type="radio" name="attStatus" value="Present" checked> Present</label>
                        <label
                            style="position: static; font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem;"><input
                                type="radio" name="attStatus" value="Absent"> Absent</label>
                    </div>
                </div>
                <p
                    style="font-size: 0.85rem; color: var(--text-muted); margin-top: 1rem; background: var(--bg-soft); padding: 0.75rem; border-radius: 8px;">
                    * This will mark attendance for all students in the selected class.
                </p>
                <button type="submit" class="btn btn-primary btn-full mt-lg">Submit Attendance</button>
            </form>
        </div>
    </div>

    <!-- Upload Marks Modal -->
    <div id="uploadMarksModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Upload Exam Marks</h3>
                <button class="modal-close" onclick="closeModal('uploadMarksModal')">&times;</button>
            </div>
            <form id="uploadMarksForm">
                <div class="form-group">
                    <input type="text" id="marksExam" required placeholder=" ">
                    <label for="marksExam">Exam Name (e.g. Unit Test 1)</label>
                </div>
                <div class="form-group">
                    <select id="marksClass" required>
                        <option value="">Select Class</option>
                        <option value="10-A">Class 10-A</option>
                        <option value="10-B">Class 10-B</option>
                    </select>
                    <label for="marksClass">Class</label>
                </div>
                <div class="form-group">
                    <select id="marksSubject" required>
                        <option value="">Select Subject</option>
                        <option value="Maths">Mathematics</option>
                        <option value="Science">Science</option>
                        <option value="English">English</option>
                    </select>
                    <label for="marksSubject">Subject</label>
                </div>
                <div class="form-group">
                    <div
                        style="border: 2px dashed var(--border-color); padding: 1.5rem; text-align: center; border-radius: 12px; background: var(--bg-soft);">
                        <p style="font-size: 0.9rem; color: var(--text-muted);">Drag & drop or</p>
                        <input type="file" style="display: none;" id="marksFile">
                        <button type="button" class="btn btn-outline btn-sm mt-sm"
                            onclick="document.getElementById('marksFile').click()">Choose File</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Upload Marks</button>
            </form>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="auth.js"></script>
    <script src="staff-dashboard.js"></script>
</body>

</html>
